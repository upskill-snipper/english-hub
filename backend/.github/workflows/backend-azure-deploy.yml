name: Backend — Build, Test & Deploy to Azure

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

env:
  AZURE_WEBAPP_NAME: english-hub-api    # ← Change to your App Service name
  NODE_VERSION: '20.x'
  WORKING_DIRECTORY: backend

permissions:
  id-token: write   # Required for Azure OIDC login
  contents: read

jobs:
  # ─── Build & Test ──────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci-test-secret-at-least-32-chars-long!!
          NODE_ENV: test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            ${{ env.WORKING_DIRECTORY }}/dist
            ${{ env.WORKING_DIRECTORY }}/package.json
            ${{ env.WORKING_DIRECTORY }}/package-lock.json
          retention-days: 1

  # ─── Deploy to Azure App Service ───────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: deploy

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install production dependencies
        working-directory: deploy
        run: npm ci --omit=dev

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy

      - name: Verify deployment health
        run: |
          echo "Waiting 30s for App Service to start..."
          sleep 30
          HEALTH_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" --max-time 15)
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed with status $STATUS"
            curl -s "$HEALTH_URL" || true
            exit 1
          fi
          echo "Deployment verified successfully"
