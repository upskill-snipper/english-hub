name: Deploy to Vercel
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  # ───────────────────────────────────────────────────────────────────
  # Quality gate — lint, typecheck, test, audit. Must pass before any
  # deploy step can run. Previously the CI and Deploy workflows were
  # independent, which meant a failing CI run could not block a deploy
  # on merge to main. Embedding the checks here closes that gap.
  # ───────────────────────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx next lint
      - run: npx tsc --noEmit
      - run: npm test
      - name: Production-dependency audit (CRITICAL blocks)
        run: npm audit --omit=dev --audit-level=critical

  deploy:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy to Vercel (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Pinned by SHA (supply-chain hardening — tags are mutable, SHAs
        # are not). v25 = 16e87c0a08142b0d0d33b76aeaf20823c381b9b9. When
        # updating, re-resolve the tag via GitHub API and pin to the new
        # commit SHA.
        uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9
        id: vercel-preview
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployment ready: ${{ steps.vercel-preview.outputs.preview-url }}`
            })
