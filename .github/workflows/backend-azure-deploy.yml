name: Backend — Build, Test & Deploy to Azure

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/backend-azure-deploy.yml']
  pull_request:
    branches: [main]
    paths: ['backend/**']

env:
  AZURE_WEBAPP_NAME: english-hub-api
  NODE_VERSION: '20.x'
  WORKING_DIRECTORY: backend

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci-test-secret-at-least-32-chars-long!!
          NODE_ENV: test

      - name: Build
        run: npm run build

      - name: Prepare deploy package
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p ../deploy-package
          cp -r dist/* ../deploy-package/
          cp package.json package-lock.json ../deploy-package/
          cd ../deploy-package
          npm ci --omit=dev

      - name: Upload deploy artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-deploy
          path: deploy-package
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-deploy
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: deploy

      - name: Verify deployment health
        run: |
          echo "Waiting 45s for App Service to start..."
          sleep 45
          HEALTH_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" --max-time 20)
            echo "Attempt $i: Health check returned $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified successfully"
              exit 0
            fi
            sleep 15
          done
          echo "::warning::Health check did not return 200 after 3 attempts (may still be starting)"
